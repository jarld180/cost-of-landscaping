name: Activate all contractors + dump CSV

on:
  workflow_dispatch:
    inputs:
      commit:
        required: true
        default: 'no'
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - env:
          AWS_EC2_HOST: ${{ secrets.AWS_COC_HOST }}
          AWS_EC2_USER: ${{ secrets.AWS_COC_USER }}
          AWS_PRIVATE_KEY: ${{ secrets.AWS_COC_PRIVATE_KEY }}
          COMMIT_FLAG: ${{ github.event.inputs.commit }}
        run: |
          echo "${AWS_PRIVATE_KEY}" > k.pem && chmod 600 k.pem
          scp -o StrictHostKeyChecking=no -i k.pem seeds/activate-all-contractors.mjs ${AWS_EC2_USER}@${AWS_EC2_HOST}:/home/${AWS_EC2_USER}/a.mjs
          ssh -o StrictHostKeyChecking=no -i k.pem ${AWS_EC2_USER}@${AWS_EC2_HOST} "COMMIT=${COMMIT_FLAG} node /home/${AWS_EC2_USER}/a.mjs && rm -f /home/${AWS_EC2_USER}/a.mjs"
          # Pull CSV back to runner if it exists
          scp -o StrictHostKeyChecking=no -i k.pem ${AWS_EC2_USER}@${AWS_EC2_HOST}:/home/${AWS_EC2_USER}/contractors-active.csv ./contractors-active.csv 2>/dev/null || echo "no CSV (dry-run?)"
          ls -la contractors-active.csv 2>/dev/null || true
          rm k.pem
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contractors-active-csv
          path: contractors-active.csv
          if-no-files-found: warn
