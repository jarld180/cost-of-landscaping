name: Glow up LC listicles (NC) — one-shot

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'yes to write, anything else = dry-run'
        required: true
        default: 'no'
        type: string
      one_city:
        description: 'optional city slug to limit run to (e.g. mooresville)'
        required: false
        default: ''
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - env:
          AWS_EC2_HOST: ${{ secrets.AWS_COC_HOST }}
          AWS_EC2_USER: ${{ secrets.AWS_COC_USER }}
          AWS_PRIVATE_KEY: ${{ secrets.AWS_COC_PRIVATE_KEY }}
          COMMIT_FLAG: ${{ github.event.inputs.commit }}
          ONE_CITY_FLAG: ${{ github.event.inputs.one_city }}
        run: |
          echo "${AWS_PRIVATE_KEY}" > k.pem && chmod 600 k.pem
          scp -o StrictHostKeyChecking=no -i k.pem seeds/glow-up-lc-listicles.mjs ${AWS_EC2_USER}@${AWS_EC2_HOST}:/home/${AWS_EC2_USER}/glow.mjs
          ssh -o StrictHostKeyChecking=no -i k.pem ${AWS_EC2_USER}@${AWS_EC2_HOST} "COMMIT=${COMMIT_FLAG} ONE_CITY=${ONE_CITY_FLAG} node /home/${AWS_EC2_USER}/glow.mjs && rm -f /home/${AWS_EC2_USER}/glow.mjs"
          rm k.pem
